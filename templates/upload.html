<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Prescription - Medi Guide</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm w-100">
        <div class="container">
             <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Medi Guide Logo" class="logo">
                <span class="medi">MEDI</span>&nbsp;<span class="guide">GUIDE</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/upload_page">Upload Prescription</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- UPLOAD SECTION -->
    <main class="upload-wrapper">
        <div class="container d-flex justify-content-center">
            <div class="upload-card">
                <div class="mb-4">
                    <img src="static/img/logo.png" alt="Medi Guide Logo" width="50" height="50">
                    <h2 class="fw-bold mt-3">Upload Your Prescription</h2>
                    <p class="text-muted">Fast & accurate AI analysis for your medications.</p>
                </div>
                
                <div id="drop-zone" class="upload-zone">
                    <form id="upload-form" enctype="multipart/form-data">
                        <input type="file" id="file-input" name="prescription" hidden accept="image/png, image/jpeg, image/jpg">
                    </form>
                    <div class="upload-content">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <h5 class="fw-semibold">Drag & Drop file here</h5>
                        <p class="text-muted small">or click to browse from your device</p>
                        <p class="text-xs text-secondary">Only JPG, PNG files supported</p>
                    </div>
                    
                    <div id="preview-container">
                        <img id="preview-image" src="" alt="Prescription Preview">
                        <button id="remove-file" class="remove-btn"><i class="fas fa-times"></i></button>
                        <p id="file-name" class="mt-2 text-primary fw-medium"></p>
                    </div>
                </div>

                <div class="mb-4 text-start">
                    <label for="language-select" class="form-label fw-bold small text-muted">Select Display Language</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-language text-primary"></i></span>
                        <select class="form-select border-start-0 ps-0" id="language-select">
                            <option value="en">English (English)</option>
                            <option value="hi">हिन्दी (Hindi)</option>
                            <option value="te">తెలుగు (Telugu)</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button id="analyze-btn" class="btn btn-primary btn-auth py-3" disabled>
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        <span class="btn-text">Analyze Prescription</span>
                    </button>
                </div>
                
                <p class="mt-4 text-muted small">
                    <i class="fas fa-shield-alt me-1"></i> Your data is processed securely and privately.
                </p>
            </div>
        </div>
    </main>

    <!-- JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/script.js"></script>
    <script src="static/js/upload.js"></script>
</body>
</html>
